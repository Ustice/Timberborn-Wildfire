name: Release

on:
  push:
    tags:
      - "v*.*.*.*"
  workflow_dispatch:
    inputs:
      expected_version:
        description: "Optional four-part manifest version to validate, for example 0.1.0.0."
        required: false
        type: string
      expected_tag:
        description: "Optional v-prefixed release tag to validate without attaching a GitHub Release asset."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-release:
    name: Package release
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      EXPECTED_TAG: ${{ github.event.inputs.expected_tag || '' }}
      EXPECTED_VERSION: ${{ github.event.inputs.expected_version || '' }}
      WILDFIRE_UNITY_EXECUTABLE: ${{ vars.WILDFIRE_UNITY_EXECUTABLE || '/Applications/Unity/Hub/Editor/6000.3.6f1/Unity.app/Contents/MacOS/Unity' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Package Wildfire
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release/logs
          package_args=()

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            package_args+=(--tag "${GITHUB_REF_NAME}")
          fi

          if [[ -n "${EXPECTED_VERSION}" ]]; then
            package_args+=(--version "${EXPECTED_VERSION}")
          fi

          if [[ -n "${EXPECTED_TAG}" ]]; then
            package_args+=(--tag "${EXPECTED_TAG}")
          fi

          {
            echo "github_ref=${GITHUB_REF}"
            echo "github_ref_type=${GITHUB_REF_TYPE}"
            echo "github_ref_name=${GITHUB_REF_NAME}"
            echo "wildfire_unity_executable=${WILDFIRE_UNITY_EXECUTABLE:-script-default}"
            bun run release:package -- "${package_args[@]}"
          } 2>&1 | tee release/logs/release-package.log

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wildfire-release-package-${{ github.run_id }}
          if-no-files-found: error
          path: |
            release/package/Wildfire
            release/package/Wildfire-*.zip

      - name: Upload release logs artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wildfire-release-logs-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            release/logs
            src/Wildfire.Unity/UnityBatchmodeProject/Build/AssetBundles/*.log

      - name: Attach package to GitHub Release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          package_path="$(find release/package -maxdepth 1 -type f -name 'Wildfire-*.zip' | sort | tail -n 1)"
          if [[ -z "${package_path}" ]]; then
            echo "No Wildfire release zip found in release/package." >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${package_path}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${package_path}" \
              --title "Wildfire ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
